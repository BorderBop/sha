services:
  leaderboard:
    build:
      context: .
      dockerfile: Dockerfile.leaderboard
    ports:
      # localhost only - the existing system Caddy on this server handles
      # the public side and proxies /api/* here (see Caddyfile)
      - "127.0.0.1:8765:8765"
    volumes:
      - leaderboard_data:/data
    restart: unless-stopped

volumes:
  leaderboard_data:
