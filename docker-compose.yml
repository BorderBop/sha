services:
  leaderboard:
    build:
      context: .
      dockerfile: Dockerfile.leaderboard
    ports:
      # только на localhost - наружу отдаёт уже существующий системный Caddy
      # на этом сервере, который проксирует /api/* сюда (см. Caddyfile)
      - "127.0.0.1:8765:8765"
    volumes:
      - leaderboard_data:/data
    restart: unless-stopped

volumes:
  leaderboard_data:
